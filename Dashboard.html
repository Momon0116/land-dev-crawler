                      <input type="text" value={historyFormData.status || ''} onChange={e=>setHistoryFormData({...historyFormData, status:e.target.value})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none focus:ring-2 focus:ring-blue-500" placeholder="例如：都計審議中" />
                    </div>
                    <div className="space-y-2 md:col-span-2">
                      <label className="text-sm font-black text-slate-700">歷程說明內容</label>
                      <textarea rows="4" value={historyFormData.note || ''} onChange={e=>setHistoryFormData({...historyFormData, note:e.target.value})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none focus:ring-2 focus:ring-blue-500 leading-relaxed" placeholder="請填寫最新辦理情形..."></textarea>
                    </div>
                    <div className="space-y-2"><label className="text-sm font-black text-slate-700">資料來源 (選填)</label><input type="text" value={historyFormData.source || ''} onChange={e=>setHistoryFormData({...historyFormData, source:e.target.value})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none" placeholder="例如：內政部會議紀錄" /></div>
                    <div className="space-y-2"><label className="text-sm font-black text-slate-700">來源網址 (選填)</label><input type="text" value={historyFormData.sourceUrl || ''} onChange={e=>setHistoryFormData({...historyFormData, sourceUrl:e.target.value})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none text-blue-600" placeholder="https://" /></div>
                  </div>

                  {((projectTypes.find(t => t.name === selectedProject.type)?.phases) || []).length > 0 && (
                    <div className="pt-5 border-t border-slate-200 space-y-5">
                      <div className="space-y-2">
                        <label className="text-sm font-black text-slate-700">此紀錄屬於哪個階段？</label>
                        <select value={historyFormData.belongToPhase !== undefined ? historyFormData.belongToPhase : -1} onChange={e=>setHistoryFormData({...historyFormData, belongToPhase: parseInt(e.target.value)})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none text-blue-800">
                          <option value={-1}>* 非屬特定法定階段 (一般與前期歷程)</option>
                          {(projectTypes.find(t => t.name === selectedProject.type)?.phases || []).map((phase, idx) => <option key={idx} value={idx}>{idx + 1}. {phase}</option>)}
                        </select>
                      </div>

                      {historyFormData.mode === 'add' && (
                        <div className="p-5 bg-slate-50 rounded-xl border border-slate-200 space-y-4">
                          <label className="flex items-center gap-3 cursor-pointer">
                            <input type="checkbox" checked={historyFormData.updatePhase || false} onChange={e=>setHistoryFormData({...historyFormData, updatePhase: e.target.checked})} className="w-5 h-5 text-blue-600 rounded border-slate-300" />
                            <span className="text-sm md:text-base font-black text-slate-700">同步推進案件主階段</span>
                          </label>
                          {historyFormData.updatePhase && (
                            <select value={historyFormData.newPhaseIndex || 0} onChange={e=>setHistoryFormData({...historyFormData, newPhaseIndex: parseInt(e.target.value)})} className="w-full p-3 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold outline-none mt-2 text-blue-800">
                              {(projectTypes.find(t => t.name === selectedProject.type)?.phases || []).map((phase, idx) => <option key={idx} value={idx}>{idx + 1}. {phase}</option>)}
                            </select>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
                <div className="p-4 sm:p-5 bg-slate-50 border-t border-slate-100 flex flex-row items-center justify-between gap-2 shrink-0 sm:rounded-b-2xl overflow-x-auto no-scrollbar w-full">
                  {historyFormData.mode === 'edit' ? (
                     confirmDelete ? (
                         <div className="flex items-center gap-2 shrink-0">
                            <button onClick={async () => {
                              let updatedProject = { ...selectedProject };
                              updatedProject.history = (updatedProject.history || []).filter(log => log.id !== historyFormData.id);
                              if (updatedProject.history.length > 0) {
                                updatedProject.history.sort((a, b) => parseTWDate(b.date) - parseTWDate(a.date));
                                updatedProject.status = updatedProject.history[0]?.status || updatedProject.status;
                                updatedProject.lastUpdate = updatedProject.history[0]?.date.replace(/\./g, '/') || updatedProject.lastUpdate;
                              }
                              await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', updatedProject.id.toString()), updatedProject);
                              setIsHistoryModalOpen(false);
                              setConfirmDelete(false);
                            }} className="px-4 py-2.5 bg-red-600 text-white rounded-lg text-sm md:text-base font-bold shadow-sm whitespace-nowrap">確定刪除</button>
                            <button onClick={()=>setConfirmDelete(false)} className="px-4 py-2.5 bg-white border border-slate-300 text-slate-700 rounded-lg text-sm md:text-base font-bold whitespace-nowrap">取消</button>
                         </div>
                      ) : (
                         <button onClick={()=>setConfirmDelete(true)} className="shrink-0 px-4 py-2.5 text-red-600 border border-red-200 bg-red-50 hover:bg-red-100 rounded-lg text-sm md:text-base font-bold whitespace-nowrap">刪除此紀錄</button>
                      )
                  ) : <div className="shrink-0"></div>}
                  <div className="flex items-center gap-2 shrink-0">
                     <button onClick={()=>setIsHistoryModalOpen(false)} className="px-6 py-2.5 text-slate-600 font-bold text-sm md:text-base bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm whitespace-nowrap">取消</button>
                     <button onClick={handleSaveHistory} className="px-8 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm md:text-base shadow-md hover:bg-blue-700 whitespace-nowrap">確認儲存</button>
                  </div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
