<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>專案進程管理系統</title>
  
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18.2.0/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: #f8fafc; -webkit-tap-highlight-color: transparent; }
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .table-scroll { width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; }
    
    @keyframes pulse-ring {
      0% { transform: scale(.8); opacity: 0.5; }
      80%, 100% { opacity: 0; }
    }
    .bell-pulse::before {
      content: '';
      position: absolute;
      width: 100%;
      height: 100%;
      background-color: #fbbf24;
      border-radius: 0.5rem;
      animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
      z-index: -1;
    }
  </style>
</head>
<body class="text-slate-800 antialiased">
  <div id="root"></div>

  <script type="text/babel" data-type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { getAuth, signInWithEmailAndPassword, signInWithCustomToken, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { getFirestore, collection, doc, setDoc, onSnapshot, deleteDoc, addDoc } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    const { useState, useEffect, useRef } = React;

    const Icon = ({ name, size = 20, className = "" }) => {
      const iconName = name.split('-').map(word => word.charAt(0).toUpperCase() + word.slice(1)).join('');
      const iconData = window.lucide?.icons[iconName];
      
      if (!iconData) return <svg width={size} height={size} className={className} />;
      
      let html = '';
      if (Array.isArray(iconData)) {
        if (typeof iconData[0] === 'string') {
          const children = iconData[2] || [];
          html = children.map(([cTag, cAttrs]) => {
            const attrStr = Object.entries(cAttrs || {}).map(([k, v]) => `${k}="${v}"`).join(' ');
            return `<${cTag} ${attrStr}></${cTag}>`;
          }).join('');
        } else {
          html = iconData.map(([cTag, cAttrs]) => {
            const attrStr = Object.entries(cAttrs || {}).map(([k, v]) => `${k}="${v}"`).join(' ');
            return `<${cTag} ${attrStr}></${cTag}>`;
          }).join('');
        }
      }
      
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} dangerouslySetInnerHTML={{ __html: html }} />
      );
    };

    const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
      apiKey: "AIzaSyDmt430oA0Opg8SbXBBb-HHR6KcztMU6Qc",
      authDomain: "land-dev-dashboard.firebaseapp.com",
      projectId: "land-dev-dashboard",
      storageBucket: "land-dev-dashboard.firebasestorage.app",
      messagingSenderId: "264462869739",
      appId: "1:264462869739:web:ff99412ffb2b85f7fd8aae",
      measurementId: "G-9CVBLEPBEJ"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const appId = typeof __app_id !== 'undefined' ? __app_id : 'land-dev-app';

    const INITIAL_TYPES = [
      { name: '重劃案件', phases: ["成立籌備會", "第一次會員大會", "重劃會章程", "成立重劃會", "核定開發計畫書", "核定重劃範圍", "核定重劃計畫書", "公告重劃計畫書", "核定工程預算書圖", "禁止土地移轉、分割及設定負擔公告", "評定重劃前後地價", "核定計算負擔總計表", "土地分配公告", "地籍整理及權利變更登記", "交接土地", "公共設施點交接管", "重劃完成", "公共設施保固期", "財務結算", "成果報告"] },
      { name: '區段徵收', phases: ["報核範圍", "准予徵收", "協議價購", "公告徵收", "補償發放"] },
      { name: '一般開發', phases: [] },
      { name: '都市更新', phases: ["劃定更新地區", "事業概要", "都市更新事業計畫", "權利變更計畫", "施工", "完工交屋"] }
    ];

    function App() {
      const [user, setUser] = useState(null);
      const [loading, setLoading] = useState(true);
      const [loginEmail, setLoginEmail] = useState("");
      const [loginPass, setLoginPass] = useState("");

      const [projects, setProjects] = useState([]);
      const [projectTypes, setProjectTypes] = useState([]);
      const [commonSources, setCommonSources] = useState([]); 
      const [reports, setReports] = useState([]);
      
      const [pendingUpdates, setPendingUpdates] = useState([]);
      const [isInboxOpen, setIsInboxOpen] = useState(false);
      const [isReportsModalOpen, setIsReportsModalOpen] = useState(false);
      const [selectedReport, setSelectedReport] = useState(null);

      const [currentView, setCurrentView] = useState('dashboard');
      const [selectedId, setSelectedId] = useState(null);
      const [showArchived, setShowArchived] = useState(false); 
      const [activeFilter, setActiveFilter] = useState({ type: 'all', value: null });
      const [searchQuery, setSearchQuery] = useState('');

      const [isProjectModalOpen, setIsProjectModalOpen] = useState(false);
      const [modalMode, setModalMode] = useState('add'); 
      const [formData, setFormData] = useState({});
      const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
      const [confirmDelete, setConfirmDelete] = useState(false);
      const [confirmDeleteProject, setConfirmDeleteProject] = useState(false); 
      const [confirmDeleteType, setConfirmDeleteType] = useState(false); 
      const [historyFormData, setHistoryFormData] = useState({});
      const [isTypeModalOpen, setIsTypeModalOpen] = useState(false);
      const [settingsView, setSettingsView] = useState('list');
      const [settingsTab, setSettingsTab] = useState('types'); 
      const [editingTypeIndex, setEditingTypeIndex] = useState(-1);
      const [newTypeData, setNewTypeData] = useState({ name: '', phases: [''] });

      useEffect(() => {
        const initAuth = async () => {
          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            }
          } catch(e) { console.error("驗證失敗:", e); }
        };
        initAuth();
        const unsubscribe = onAuthStateChanged(auth, (u) => {
          setUser(u);
          setLoading(false);
        });
        return () => unsubscribe();
      }, []);

      const handleLogin = async (e) => {
        e.preventDefault();
        try { await signInWithEmailAndPassword(auth, loginEmail, loginPass); } 
        catch (err) { alert("登入失敗：請確認帳號密碼是否正確。"); }
      };

      const handleLogout = () => signOut(auth);

      useEffect(() => {
        if (!user || !db) return;
        const userPath = ['artifacts', appId, 'users', user.uid];
        
        const unsubProjects = onSnapshot(collection(db, ...userPath, 'projects'), (snapshot) => {
          setProjects(snapshot.docs.map(doc => doc.data()));
        }, (error) => console.error("讀取專案失敗:", error));

        const unsubTypes = onSnapshot(collection(db, ...userPath, 'projectTypes'), (snapshot) => {
          if (snapshot.empty) {
            INITIAL_TYPES.forEach(async (t) => await setDoc(doc(db, ...userPath, 'projectTypes', t.name), t));
          } else {
            setProjectTypes(snapshot.docs.map(doc => doc.data()));
          }
        }, (error) => console.error("讀取類型失敗:", error));

        const unsubPending = onSnapshot(collection(db, ...userPath, 'pending_updates'), (snapshot) => {
          const updates = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setPendingUpdates(updates.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0)));
        }, (error) => console.error("讀取待審核失敗:", error));

        const unsubCommonSources = onSnapshot(collection(db, ...userPath, 'commonSources'), (snapshot) => {
          setCommonSources(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
        }, (error) => console.error("讀取常用來源失敗:", error));

        const unsubReports = onSnapshot(collection(db, ...userPath, 'crawler_reports'), (snapshot) => {
          const reps = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          setReports(reps.sort((a, b) => (b.timestamp?.toMillis?.() || 0) - (a.timestamp?.toMillis?.() || 0)));
        }, (error) => console.error("讀取查核報告失敗:", error));

        return () => { unsubProjects(); unsubTypes(); unsubPending(); unsubCommonSources(); unsubReports(); };
      }, [user]);

      const selectedProject = projects.find(p => p.id === selectedId) || null;

      const parseTWDate = (twDateStr) => {
        if (!twDateStr) return 0;
        const parts = twDateStr.split(/[./-]/);
        if (parts.length !== 3) return 0;
        return new Date(parseInt(parts[0]) + 1911, parseInt(parts[1]) - 1, parseInt(parts[2])).getTime();
      };

      const getDaysSinceUpdate = (twDateStr) => {
        const ts = parseTWDate(twDateStr);
        if (!ts) return 0;
        return Math.max(0, Math.floor((new Date().getTime() - ts) / 86400000));
      };

      const getTypeColor = (type) => {
        if (!type) return 'bg-slate-50 text-slate-500 border-slate-200';
        if (type.includes('重劃')) return 'bg-blue-50 text-blue-700 border-blue-200';
        if (type.includes('區段徵收')) return 'bg-emerald-50 text-emerald-700 border-emerald-200';
        if (type.includes('一般')) return 'bg-amber-50 text-amber-700 border-amber-200';
        if (type.includes('都市更新')) return 'bg-purple-50 text-purple-700 border-purple-200';
        return 'bg-indigo-50 text-indigo-700 border-indigo-200';
      };

      const getCityColor = (city) => {
        return 'bg-slate-100 text-slate-600 border-slate-200';
      };

      const handleSaveProject = async () => {
        if (!user) return;
        const typeDef = projectTypes.find(t => t.name === formData.type);
        const hasPhases = typeDef && typeDef.phases && typeDef.phases.length > 0;
        let projId = formData.id;
        let projectData = { ...formData };
        if (modalMode === 'add') {
          const today = new Date();
          const dateStr = `${today.getFullYear()-1911}/${String(today.getMonth()+1).padStart(2,'0')}/${String(today.getDate()).padStart(2,'0')}`;
          projId = Date.now();
          projectData = { ...projectData, id: projId, lastUpdate: dateStr, currentPhaseIndex: hasPhases ? 0 : -1, phaseDates: {}, isArchived: false, history: [{ id: Date.now().toString(), date: dateStr.replace(/\./g, '.'), note: '案件初始建檔', phaseIndex: -1, status: formData.status || '初始建檔' }] };
        } else {
          let newPhaseIndex = formData.currentPhaseIndex !== undefined ? formData.currentPhaseIndex : 0;
          if (selectedProject?.type !== formData.type) newPhaseIndex = hasPhases ? 0 : -1;
          projectData.currentPhaseIndex = newPhaseIndex;
        }
        const cleanData = JSON.parse(JSON.stringify(projectData));
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', projId.toString()), cleanData);
        setIsProjectModalOpen(false);
      };

      const handleSaveHistory = async () => {
        if (!historyFormData.date || !user) return;
        let updatedProject = { ...selectedProject };
        const typeDef = projectTypes.find(t => t.name === updatedProject.type);
        const hasPhases = typeDef && typeDef.phases && typeDef.phases.length > 0;

        if (historyFormData.mode === 'add') {
          const newItem = { id: Date.now().toString(), date: historyFormData.date, note: historyFormData.note || '', source: historyFormData.source || '', sourceUrl: historyFormData.sourceUrl || '', phaseIndex: parseInt(historyFormData.belongToPhase) || -1, status: historyFormData.status || updatedProject.status || '系統列管中' };
          updatedProject.history = [newItem, ...(updatedProject.history || [])];
          
          if (hasPhases && historyFormData.updatePhase) {
            const parsedPhaseIndex = parseInt(historyFormData.newPhaseIndex) || 0;
            updatedProject.currentPhaseIndex = parsedPhaseIndex;
            if (typeDef.phases[parsedPhaseIndex]) {
              updatedProject.phaseDates = { ...updatedProject.phaseDates, [typeDef.phases[parsedPhaseIndex]]: historyFormData.date };
            }
          }
        } else {
          updatedProject.history = (updatedProject.history || []).map(h => h.id === historyFormData.id ? { ...h, date: historyFormData.date, note: historyFormData.note || '', source: historyFormData.source || '', sourceUrl: historyFormData.sourceUrl || '', phaseIndex: parseInt(historyFormData.belongToPhase) || -1, status: historyFormData.status || h.status || '系統列管中' } : h);
        }
        updatedProject.history.sort((a, b) => parseTWDate(b.date) - parseTWDate(a.date));
        updatedProject.status = updatedProject.history[0]?.status || updatedProject.status;
        updatedProject.lastUpdate = updatedProject.history[0]?.date.replace(/\./g, '/') || updatedProject.lastUpdate;
        
        const cleanData = JSON.parse(JSON.stringify(updatedProject));
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', updatedProject.id.toString()), cleanData);
        setIsHistoryModalOpen(false);
      };

      const toggleArchive = async () => {
        if (!selectedProject || !user) return;
        const updated = { ...selectedProject, isArchived: !selectedProject.isArchived };
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', updated.id.toString()), updated);
      };

      const handleDeleteHistory = async (id) => {
        if (!selectedProject || !user || !db) return;
        let updatedProject = { ...selectedProject };
        updatedProject.history = (updatedProject.history || []).filter(log => log.id !== id);
        if (updatedProject.history.length > 0) {
          updatedProject.history.sort((a, b) => parseTWDate(b.date) - parseTWDate(a.date));
          updatedProject.status = updatedProject.history[0]?.status || updatedProject.status;
          updatedProject.lastUpdate = updatedProject.history[0]?.date.replace(/\./g, '/') || updatedProject.lastUpdate;
        }
        const cleanData = JSON.parse(JSON.stringify(updatedProject));
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', updatedProject.id.toString()), cleanData);
        setIsHistoryModalOpen(false);
        setConfirmDelete(false);
      };

      const handleAddCommonSource = async (name, url) => {
        if (!user || !name || !url) return;
        await addDoc(collection(db, 'artifacts', appId, 'users', user.uid, 'commonSources'), { name, url });
      };

      const handleDeleteCommonSource = async (id) => {
        if (!user) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'commonSources', id));
      };

      const handleSaveNewType = async () => {
        if (!newTypeData.name.trim() || !user) return;
        const validPhases = newTypeData.phases.map(p => p.trim()).filter(p => p !== '');
        const newTypeObj = { name: newTypeData.name.trim(), phases: validPhases };
        await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projectTypes', newTypeObj.name), newTypeObj);
        setSettingsView('list');
        setNewTypeData({ name: '', phases: [''] });
        setConfirmDeleteType(false); 
      };

      const handleApproveUpdate = async (update) => {
        try {
          if (!user) return;
          const proj = projects.find(p => String(p.id) === String(update.projectId));
          if (!proj) return;
          
          let cleanNote = update.note || "";
          if (cleanNote.startsWith("【新聞】")) cleanNote = cleanNote.replace("【新聞】", "").trim();
          else if (cleanNote.startsWith("【政府資訊】")) cleanNote = cleanNote.replace("【政府資訊】", "").trim();
          else if (cleanNote.startsWith("【機器人原始抓取資料】")) cleanNote = cleanNote.replace("【機器人原始抓取資料】", "").trim();
          
          if (cleanNote.includes("📌 資料來源：")) {
             cleanNote = cleanNote.split("📌 資料來源：")[0].trim();
          }
          
          const cleanUpdate = {
             id: update.id,
             date: update.date,
             note: cleanNote,
             source: update.source || "",
             sourceUrl: update.sourceUrl || "",
             phaseIndex: -1,
             status: proj.status || '系統列管中'
          };
          
          let updatedProj = { ...proj, history: [cleanUpdate, ...(proj.history || [])] };
          updatedProj.history.sort((a, b) => parseTWDate(b.date) - parseTWDate(a.date));
          updatedProj.status = updatedProj.history[0]?.status || updatedProj.status;
          updatedProj.lastUpdate = updatedProj.history[0]?.date.replace(/\./g, '/') || updatedProj.lastUpdate;
          
          const cleanData = JSON.parse(JSON.stringify(updatedProj));
          await setDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', proj.id.toString()), cleanData);
          await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'pending_updates', update.id));
        } catch(e) { console.error("確認加入失敗:", e); }
      };

      const handleRejectUpdate = async (id) => {
        if (!user) return;
        await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'pending_updates', id));
      };

      const openAddModal = () => {
        setModalMode('add');
        setFormData({ name: '', type: projectTypes[0]?.name || '', city: '', status: '初始建檔', handler: '', handlerPhone: '', agency: '', currentPhaseIndex: 0, keywords: '', sources: [{ name: '', url: '' }] });
        setIsProjectModalOpen(true);
      };

      const openEditModal = () => {
        setModalMode('edit');
        const proj = { ...selectedProject };
        if (!proj.sources && proj.govUrl) {
          proj.sources = proj.govUrl.split(/[\s,]+/).filter(u => u.trim() !== '').map(u => ({ name: '', url: u }));
        }
        if (!proj.sources || proj.sources.length === 0) proj.sources = [{ name: '', url: '' }];
        setFormData(proj);
        setIsProjectModalOpen(true);
      };

      const openHistoryModal = () => {
        const today = new Date();
        const twYear = today.getFullYear() - 1911;
        const dateStr = `${twYear}.${String(today.getMonth() + 1).padStart(2, '0')}.${String(today.getDate()).padStart(2, '0')}`;
        const typeDef = projectTypes.find(t => t.name === selectedProject?.type);
        const hasPhases = typeDef && typeDef.phases.length > 0;
        setHistoryFormData({
          mode: 'add', id: null, date: dateStr, note: '', source: '', sourceUrl: '', 
          belongToPhase: hasPhases ? (selectedProject.currentPhaseIndex !== -1 ? selectedProject.currentPhaseIndex : -1) : -1,
          updatePhase: false, newPhaseIndex: hasPhases ? (selectedProject.currentPhaseIndex !== -1 ? selectedProject.currentPhaseIndex + 1 : 0) : 0,
          status: selectedProject?.status || '' 
        });
        setConfirmDelete(false);
        setIsHistoryModalOpen(true);
      };

      const openEditHistoryModal = (log) => {
        setHistoryFormData({
          mode: 'edit', id: log.id, date: log.date, note: log.note, source: log.source || '', sourceUrl: log.sourceUrl || '',
          belongToPhase: log.phaseIndex !== undefined ? log.phaseIndex : -1,
          updatePhase: false, newPhaseIndex: 0,
          status: log.status || '' 
        });
        setConfirmDelete(false);
        setIsHistoryModalOpen(true);
      };

      const STALLED_THRESHOLD = 180;
      const activeProjects = projects.filter(p => !p.isArchived);
      const dashboardStats = {
        total: activeProjects.length,
        recent: activeProjects.filter(p => getDaysSinceUpdate(p.lastUpdate) <= 30).length,
        active: activeProjects.filter(p => p.status?.includes('審議') || (getDaysSinceUpdate(p.lastUpdate) > 30 && getDaysSinceUpdate(p.lastUpdate) <= STALLED_THRESHOLD)).length,
        stalled: activeProjects.filter(p => getDaysSinceUpdate(p.lastUpdate) > STALLED_THRESHOLD).length
      };

      const displayedProjects = projects.filter(p => {
        if (showArchived ? !p.isArchived : p.isArchived) return false;
        if (activeFilter.type === 'projectType' && p.type !== activeFilter.value) return false;
        if (activeFilter.type === 'city' && p.city !== activeFilter.value) return false;
        if (searchQuery) {
          const q = searchQuery.toLowerCase();
          return p.name?.toLowerCase().includes(q) || p.status?.toLowerCase().includes(q) || p.history?.[0]?.note?.toLowerCase().includes(q) || p.keywords?.toLowerCase().includes(q);
        }
        return true;
      });

      const getStatusColorBadge = (status) => 'bg-blue-50 text-blue-700 border-blue-200';

      const StatCard = ({ label, value, colorText, iconName }) => (
        <div className="bg-white rounded-2xl border border-slate-200 shadow-sm relative h-[88px] md:h-[110px] overflow-hidden w-full transition-all hover:shadow-md hover:border-blue-100">
          <div className="absolute bottom-3 md:bottom-4 left-4 flex items-center gap-1.5 md:gap-2 opacity-70">
            <Icon name={iconName} className={`w-4 h-4 md:w-5 md:h-5 ${colorText}`} />
            <span className="text-xs md:text-sm font-black text-slate-500 uppercase tracking-wider">{label}</span>
          </div>
          <div className="absolute top-2 md:top-3 right-4">
            <span className={`text-[32px] md:text-[44px] font-black ${colorText} leading-none tracking-tighter`}>{value}</span>
          </div>
        </div>
      );

      if (loading) { return <div className="min-h-screen flex items-center justify-center font-bold text-slate-400">連線中...</div>; }

      if (!user) {
        return (
          <div className="min-h-screen flex items-center justify-center bg-slate-100 p-4">
            <form onSubmit={handleLogin} className="bg-white p-8 md:p-12 rounded-[40px] shadow-2xl w-full max-w-md border border-slate-200">
              <div className="flex justify-center mb-8">
                <div className="bg-blue-600 p-4 rounded-3xl shadow-lg shadow-blue-200">
                  <Icon name="briefcase" className="w-10 h-10 text-white" />
                </div>
              </div>
              <h2 className="text-3xl font-black mb-2 text-center text-slate-800 tracking-tight">專案進程管理系統</h2>
              <p className="text-slate-400 text-center mb-10 font-bold">請輸入您的專屬帳號以登入系統</p>
              <div className="space-y-4">
                <div>
                  <label className="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">電子郵件</label>
                  <input type="email" required className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold" placeholder="your@email.com" onChange={e=>setLoginEmail(e.target.value)} />
                </div>
                <div>
                  <label className="block text-xs font-black text-slate-400 uppercase mb-2 ml-1">登入密碼</label>
                  <input type="password" required className="w-full p-4 bg-slate-50 border border-slate-200 rounded-2xl focus:ring-4 focus:ring-blue-100 outline-none transition-all font-bold" placeholder="••••••••" onChange={e=>setLoginPass(e.target.value)} />
                </div>
              </div>
              <button type="submit" className="w-full bg-blue-600 text-white py-5 rounded-2xl font-black shadow-xl shadow-blue-100 hover:bg-blue-700 transition-all mt-10 active:scale-95">進入管理系統</button>
            </form>
          </div>
        );
      }

      return (
        <div className="min-h-screen pb-16 md:pb-12 w-full bg-slate-50 relative">
          <header className="bg-white border-b border-slate-200 sticky top-0 z-40 w-full shadow-sm">
            <div className="w-full px-4 md:px-8 h-16 sm:h-20 flex items-center justify-between">
              <div className="flex items-center gap-3 cursor-pointer" onClick={() => {setCurrentView('dashboard'); setSelectedId(null);}}>
                <Icon name="briefcase" className="w-6 h-6 sm:w-8 sm:h-8 text-blue-600" />
                <h1 className="text-xl md:text-2xl font-black tracking-wide text-slate-800">專案進程管理系統</h1>
              </div>
              <div className="flex items-center gap-3 md:gap-4">
                <div className="flex items-center gap-2 bg-slate-100 px-2 sm:px-3 py-1.5 rounded-xl border border-slate-200">
                  <Icon name="user" className="w-4 h-4 text-slate-400 hidden sm:block" />
                  <span className="text-xs font-bold text-slate-500 hidden sm:block">{user.email}</span>
                  <button onClick={handleLogout} className="sm:ml-2 text-[10px] bg-white border border-red-100 px-2 py-0.5 rounded-lg text-red-500 font-black hover:bg-red-50 transition-colors uppercase">登出</button>
                </div>
                
                <button onClick={() => setIsReportsModalOpen(true)} className="hidden sm:flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold text-slate-700 hover:bg-slate-50 transition-colors shadow-sm">
                  <Icon name="clipboard-list" className="w-5 h-5" /> 查核紀錄
                </button>
                <button onClick={() => setIsReportsModalOpen(true)} className="sm:hidden p-2.5 bg-white border border-slate-300 rounded-lg text-slate-700 active:scale-95 transition-transform shadow-sm">
                  <Icon name="clipboard-list" className="w-5 h-5" />
                </button>

                <button onClick={() => {setIsTypeModalOpen(true); setSettingsView('list'); setSettingsTab('types'); setConfirmDeleteType(false);}} className="hidden sm:flex items-center gap-2 px-5 py-2.5 bg-white border border-slate-300 rounded-lg text-sm md:text-base font-bold text-slate-700 hover:bg-slate-50 transition-colors shadow-sm">
                  <Icon name="settings" className="w-5 h-5" /> 系統設定
                </button>
                <button onClick={() => {setIsTypeModalOpen(true); setSettingsView('list'); setSettingsTab('types'); setConfirmDeleteType(false);}} className="sm:hidden p-2.5 bg-white border border-slate-300 rounded-lg text-slate-700 active:scale-95 transition-transform shadow-sm">
                  <Icon name="settings" className="w-5 h-5" />
                </button>
                
                <div className="relative ml-1">
                  <button onClick={() => setIsInboxOpen(true)} className={`p-2.5 md:px-4 md:py-2.5 rounded-lg border shadow-sm relative flex items-center gap-2 transition-all duration-300 ${pendingUpdates.length > 0 ? 'bg-amber-100 border-amber-300 text-amber-800 hover:bg-amber-200 ring-2 ring-amber-400 ring-offset-1 bell-pulse' : 'bg-white border-slate-300 text-slate-600 hover:bg-slate-50'}`}>
                    <Icon name="bell" className={`w-5 h-5 md:w-6 md:h-6 ${pendingUpdates.length > 0 ? 'animate-pulse text-amber-600' : 'text-slate-500'}`} />
                    <span className="hidden md:inline font-bold text-sm">{pendingUpdates.length > 0 ? '待審核動態' : '無新動態'}</span>
                    {pendingUpdates.length > 0 && <span className="absolute -top-2 -right-2 w-6 h-6 bg-red-500 text-white text-xs font-black flex items-center justify-center rounded-full border-2 border-white shadow-md animate-bounce">{pendingUpdates.length}</span>}
                  </button>
                </div>
              </div>
            </div>
          </header>

          <main className="w-full py-6">
            {currentView === 'dashboard' ? (
              <div className="w-full px-4 md:px-8 space-y-8 animate-in fade-in duration-300">
                <div className="grid grid-cols-2 xl:grid-cols-4 gap-3 md:gap-6">
                  <StatCard label="追蹤案件總數" value={dashboardStats.total} colorText="text-blue-600" iconName="file-text" />
                  <StatCard label="近30日有更新" value={dashboardStats.recent} colorText="text-emerald-600" iconName="check-circle" />
                  <StatCard label="穩定推進" value={dashboardStats.active} colorText="text-amber-600" iconName="clock" />
                  <StatCard label="停滯警示" value={dashboardStats.stalled} colorText="text-red-600" iconName="alert-circle" />
                </div>
                <div className="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                  
                  {/* === 修正：總表頭部版面完美三列重構 === */}
                  <div className="px-6 md:px-8 py-5 border-b border-slate-100 bg-slate-50/80 flex flex-col xl:flex-row justify-between items-start xl:items-end gap-6">
                    
                    {/* 左側：標題與快速篩選 */}
                    <div className="flex flex-col gap-4 w-full xl:w-auto overflow-hidden">
                      <h2 className="text-xl md:text-2xl font-black text-slate-800 flex items-center gap-2">
                        <Icon name="list-todo" className="w-6 h-6 text-blue-600" /> 案件進度總表
                      </h2>
                      <div className="flex items-center gap-2 overflow-x-auto no-scrollbar w-full pt-1">
                        <span className="text-sm font-bold text-slate-400 shrink-0">快速篩選：</span>
                        <button onClick={() => setActiveFilter({type: 'all', value: null})} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors whitespace-nowrap ${activeFilter.type === 'all' ? 'bg-slate-700 text-white border-slate-700 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-100'}`}>全部</button>
                        {projectTypes.map(t => (
                           <button key={t.name} onClick={() => setActiveFilter({type: 'projectType', value: t.name})} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors whitespace-nowrap ${activeFilter.type === 'projectType' && activeFilter.value === t.name ? 'bg-blue-600 text-white border-blue-600 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-100'}`}>{t.name}</button>
                        ))}
                        <div className="w-px h-4 bg-slate-300 mx-1 shrink-0"></div>
                        {[...new Set(projects.map(p => p.city).filter(Boolean))].map(city => (
                           <button key={city} onClick={() => setActiveFilter({type: 'city', value: city})} className={`px-4 py-1.5 rounded-full text-xs font-bold border transition-colors whitespace-nowrap ${activeFilter.type === 'city' && activeFilter.value === city ? 'bg-teal-600 text-white border-teal-600 shadow-sm' : 'bg-white text-slate-500 border-slate-200 hover:bg-slate-100'}`}>{city}</button>
                        ))}
                      </div>
                    </div>

                    {/* 右側：按鈕群與長版搜尋框 (等長對齊) */}
                    <div className="flex flex-col gap-3 w-full xl:w-auto shrink-0">
                      <div className="flex items-center justify-end gap-3 w-full">
                        <div className="flex bg-slate-200/60 p-1 rounded-xl">
                          <button onClick={() => setShowArchived(false)} className={`px-5 py-2.5 rounded-lg text-sm md:text-base font-bold transition-all whitespace-nowrap w-fit ${!showArchived ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>列管中</button>
                          <button onClick={() => setShowArchived(true)} className={`px-5 py-2.5 rounded-lg text-sm md:text-base font-bold transition-all whitespace-nowrap w-fit ${showArchived ? 'bg-white text-blue-700 shadow-sm' : 'text-slate-500 hover:text-slate-700'}`}>已解除</button>
                        </div>
                        <button onClick={openAddModal} className="hidden sm:flex items-center justify-center gap-2 px-6 py-2.5 bg-blue-600 text-white rounded-xl text-sm md:text-base font-bold shadow-md hover:bg-blue-700 transition-colors whitespace-nowrap w-fit">
                          <Icon name="plus" className="w-5 h-5" /> 新增案件
                        </button>
                      </div>
                      <div className="relative w-full mt-1">
                        <Icon name="search" className="w-5 h-5 absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                        <input type="text" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} className="w-full pl-12 pr-4 py-3 border border-slate-200 rounded-xl text-sm font-bold outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-shadow" placeholder="搜尋案名、狀態、摘要..." />
                      </div>
                    </div>
                  </div>
                  {/* ======================================= */}

                  <div className="md:hidden flex flex-col gap-3 p-4 bg-slate-50">
                    {displayedProjects.length === 0 ? <div className="text-center py-10 text-slate-400 font-bold text-sm">沒有符合條件的資料</div> : displayedProjects.map((p, i) => {
                      const isStalled = !p.isArchived && getDaysSinceUpdate(p.lastUpdate) > STALLED_THRESHOLD;
                      const recentHistory = p.history?.[0] || null;
                      return (
                        <div key={p.id} onClick={() => { setSelectedId(p.id); setCurrentView('detail'); setConfirmDeleteProject(false); window.scrollTo(0,0); }} className="bg-white border border-slate-200 rounded-2xl p-5 shadow-sm relative overflow-hidden active:scale-[0.98] transition-transform">
                          {isStalled && <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-red-500"></div>}
                          <div className="flex justify-between items-start mb-2 pl-1">
                            <div className="flex items-center gap-1.5 flex-wrap">
                              <span className={`px-2.5 py-1 text-[10px] font-bold rounded-md border shadow-sm ${getCityColor(p.city)}`}>{p.city}</span>
                              <span className="text-slate-300 font-black px-0.5">|</span>
                              <span className={`px-2.5 py-1 text-[10px] font-bold rounded-md border shadow-sm ${getTypeColor(p.type)}`}>{p.type}</span>
                              {isStalled && <span className="px-2.5 py-1 text-[10px] font-bold rounded-md border shadow-sm bg-red-50 text-red-600 border-red-200 ml-1.5">停滯警示</span>}
                            </div>
                            <span className="text-xs font-black text-slate-300">#{i+1}</span>
                          </div>
                          <h3 className="font-black text-lg text-blue-900 mb-3 pl-1 leading-tight">{p.name}</h3>
                          <div className="flex justify-between items-center text-sm font-bold text-slate-500 mb-4 pl-1">
                            <span className="flex items-center gap-1.5"><Icon name="clock" className="w-4 h-4"/> {p.lastUpdate}</span>
                            <span className={`px-2.5 py-1 rounded-lg text-[11px] border ${getStatusColorBadge(p.status)}`}>{p.status}</span>
                          </div>
                          <div className="text-sm text-slate-600 bg-slate-50 p-3 rounded-xl border border-slate-100 whitespace-normal break-words leading-relaxed">{recentHistory?.note || '無最新動態摘要'}</div>
                        </div>
                      );
                    })}
                  </div>
                  <div className="hidden md:block table-scroll no-scrollbar overflow-x-auto">
                    <table className="w-full text-left border-collapse">
                      <thead>
                        {/* === 修正：調整表格欄位寬度比例，讓摘要更寬 === */}
                        <tr className="bg-white text-slate-500 text-sm font-black border-b border-slate-200 uppercase tracking-widest">
                          <th className="px-6 py-5 text-center w-16">項次</th>
                          <th className="px-6 py-5 min-w-[250px] w-1/4">案名與類型</th>
                          <th className="px-6 py-5 w-32">最新更新日期</th>
                          <th className="px-6 py-5 w-40">目前狀態</th>
                          <th className="px-6 py-5 min-w-[300px]">最新動態摘要</th>
                          <th className="px-6 py-5 text-center w-20">操作</th>
                        </tr>
                      </thead>
                      <tbody className="divide-y divide-slate-100">
                        {displayedProjects.length === 0 ? <tr><td colSpan="6" className="text-center py-16 text-slate-400 font-bold text-lg">沒有符合條件的資料</td></tr> : displayedProjects.map((p, i) => {
                          const isStalled = !p.isArchived && getDaysSinceUpdate(p.lastUpdate) > STALLED_THRESHOLD;
                          const recentHistory = p.history?.[0] || null;
                          return (
                            <tr key={p.id} onClick={() => { setSelectedId(p.id); setCurrentView('detail'); setConfirmDeleteProject(false); window.scrollTo(0,0); }} className="hover:bg-slate-50 cursor-pointer group transition-colors">
                              <td className="px-6 py-6 text-center text-slate-400 font-bold text-base relative">
                                {isStalled && <div className="absolute left-0 top-0 bottom-0 w-1.5 bg-red-500 rounded-r-md"></div>}
                                {i+1}
                              </td>
                              <td className="px-6 py-6">
                                <div className="flex flex-col gap-2">
                                  <span className="font-black text-xl text-blue-800 group-hover:underline">{p.name}</span>
                                  <div className="flex items-center gap-1.5">
                                    <span className={`px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm ${getCityColor(p.city)}`}>{p.city}</span>
                                    <span className="text-slate-300 font-black px-1">|</span>
                                    <span className={`px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm ${getTypeColor(p.type)}`}>{p.type}</span>
                                    {isStalled && <span className="px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm bg-red-50 text-red-600 border-red-200 ml-1.5">停滯警示</span>}
                                  </div>
                                </div>
                              </td>
                              <td className="px-6 py-6 text-base font-black text-slate-600">{p.lastUpdate}</td>
                              <td className="px-6 py-6"><span className={`px-3.5 py-1.5 border rounded-lg text-sm font-bold shadow-sm whitespace-nowrap ${getStatusColorBadge(p.status)}`}>{p.status}</span></td>
                              
                              {/* === 修正：移除 truncate 並加入自動換行 === */}
                              <td className="px-6 py-6 text-base text-slate-600 leading-relaxed min-w-[300px] whitespace-normal break-words">
                                {recentHistory?.note || '-'}
                              </td>
                              {/* ======================================= */}
                              
                              <td className="px-6 py-6 text-center text-slate-300 group-hover:text-blue-600">
                                <Icon name="chevron-right" className="w-5 h-5 md:w-6 md:h-6 mx-auto transition-transform group-hover:translate-x-1" />
                              </td>
                            </tr>
                          );
                        })}
                      </tbody>
                    </table>
                  </div>
                </div>
              </div>
            ) : (
              selectedProject ? (() => {
                const typeDef = projectTypes.find(t => t.name === selectedProject.type);
                const phases = typeDef?.phases || [];
                const hasPhases = phases.length > 0;
                const safePhaseIndex = selectedProject.currentPhaseIndex !== undefined ? selectedProject.currentPhaseIndex : -1;
                const progressPercent = hasPhases ? Math.max(0, Math.round((safePhaseIndex / phases.length) * 100)) : 0;
                const allEntries = [];
                (selectedProject.history || []).forEach(log => { allEntries.push({ type: 'log', log: log, timestamp: parseTWDate(log.date), phaseIdx: log.phaseIndex }); });
                phases.forEach((p, idx) => {
                   const logsForPhase = (selectedProject.history || []).filter(h => h.phaseIndex === idx);
                   const isPending = idx > safePhaseIndex;
                   if (isPending) { allEntries.push({ type: 'pending-phase', phase: p, idx: idx, timestamp: Infinity }); } 
                   else if (logsForPhase.length === 0) { const pDate = selectedProject.phaseDates?.[p]; allEntries.push({ type: 'phase-milestone', phase: p, idx: idx, date: pDate, timestamp: pDate ? parseTWDate(pDate) : 0 }); }
                });
                allEntries.sort((a, b) => {
                   if (a.timestamp !== b.timestamp) return a.timestamp - b.timestamp;
                   if (a.type === 'pending-phase' && b.type !== 'pending-phase') return 1;
                   if (a.type !== 'pending-phase' && b.type === 'pending-phase') return -1;
                   return a.idx - b.idx;
                });
                const groupedEntries = [];
                let currentGroup = null;
                allEntries.forEach(entry => {
                   if (entry.type === 'pending-phase') { if (currentGroup) groupedEntries.push(currentGroup); currentGroup = null; groupedEntries.push(entry); }
                   else if (entry.type === 'phase-milestone') { if (currentGroup) groupedEntries.push(currentGroup); groupedEntries.push({ type: 'log-group', groupType: `phase-${entry.idx}`, isGeneral: false, phaseIdx: entry.idx, phaseName: entry.phase, logs: [] }); }
                   else {
                      const pIdx = entry.log.phaseIndex;
                      const isGeneral = (pIdx === -1 || pIdx === undefined);
                      const groupType = isGeneral ? 'general' : `phase-${pIdx}`;
                      if (!currentGroup || currentGroup.groupType !== groupType) { if (currentGroup) groupedEntries.push(currentGroup); currentGroup = { type: 'log-group', groupType, isGeneral, phaseIdx: pIdx, phaseName: isGeneral ? '一般與前期歷程' : (phases[pIdx] || '未知階段'), logs: [entry.log] }; }
                      else { currentGroup.logs.push(entry.log); }
                   }
                });
                if (currentGroup) groupedEntries.push(currentGroup);

                return (
                  <div className="w-full animate-in fade-in duration-300 pb-12">
                    <div className="w-full px-4 md:px-8">
                      <div className="sticky top-16 sm:top-20 z-30 pt-6 pb-4 bg-slate-50 bg-opacity-95 backdrop-blur-sm border-b border-slate-200/50 transition-all w-full flex justify-between items-center">
                        <button onClick={() => {setCurrentView('dashboard'); setSelectedId(null); setConfirmDeleteProject(false);}} className="flex items-center gap-1.5 text-slate-500 font-bold text-sm md:text-base hover:text-slate-800 transition-colors w-max">
                          <Icon name="arrow-left" className="w-4 h-4 md:w-5 md:h-5" /> 返回總表
                        </button>
                        <button onClick={openHistoryModal} className="xl:hidden px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-bold shadow-md hover:bg-blue-700 flex items-center gap-2 transition-colors">
                          <Icon name="plus" className="w-4 h-4" /> 新增歷程
                        </button>
                      </div>

                      <div className="flex flex-col xl:flex-row gap-6 mt-6 items-start w-full relative">
                        <div className="w-full xl:w-[35%] bg-white rounded-2xl border border-slate-200 shadow-sm p-6 md:p-8 xl:sticky xl:top-[110px]">
                          <div className="flex justify-between items-start mb-6">
                            <div className="flex items-center gap-1.5 flex-wrap">
                               <span className={`px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm ${getCityColor(selectedProject.city)}`}>{selectedProject.city}</span>
                               <span className="text-slate-300 font-black px-0.5">|</span>
                               <span className={`px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm ${getTypeColor(selectedProject.type)}`}>{selectedProject.type}</span>
                               {selectedProject.isArchived && <span className="px-2.5 py-1 text-xs font-bold rounded-md border shadow-sm bg-slate-100 text-slate-600 ml-1.5">已解除列管</span>}
                            </div>
                            <div className="flex gap-2">
                              {confirmDeleteProject ? (
                                 <div className="flex gap-1 animate-in fade-in">
                                   <button onClick={async () => { if (!user) return; await deleteDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'projects', selectedProject.id.toString())); setCurrentView('dashboard'); setSelectedId(null); setConfirmDeleteProject(false); }} className="px-2.5 py-1 bg-red-600 text-white rounded text-xs font-bold whitespace-nowrap">確認刪除</button>
                                   <button onClick={() => setConfirmDeleteProject(false)} className="px-2.5 py-1 bg-slate-100 hover:bg-slate-200 text-slate-600 rounded text-xs font-bold whitespace-nowrap">取消</button>
                                 </div>
                              ) : (
                                 <>
                                   <button onClick={() => setConfirmDeleteProject(true)} className="p-1.5 bg-white border border-red-200 text-red-500 rounded-lg hover:bg-red-50 transition-colors" title="刪除案件"><Icon name="trash-2" className="w-4 h-4" /></button>
                                   <button onClick={openEditModal} className="p-1.5 bg-white border border-amber-500 text-amber-600 rounded-lg hover:bg-amber-50 transition-colors" title="編輯案件"><Icon name="pencil" className="w-4 h-4" /></button>
                                   <button onClick={toggleArchive} className={`p-1.5 bg-white border rounded-lg transition-colors ${selectedProject.isArchived ? 'border-emerald-500 text-emerald-600 hover:bg-emerald-50' : 'border-slate-300 text-slate-500 hover:bg-slate-50'}`} title={selectedProject.isArchived ? '恢復列管' : '解除列管'}><Icon name="archive" className="w-4 h-4" /></button>
                                 </>
                              )}
                            </div>
                          </div>
                          <h2 className="text-3xl font-black text-slate-800 mb-6 leading-tight">{selectedProject.name}</h2>
                          
                          {/* === 修正：左側資訊欄使用兩欄 Grid 排版，確保承辦對齊最後更新 === */}
                          <div className="grid grid-cols-1 sm:grid-cols-[55%_45%] gap-y-4 mb-6 pb-6 border-b border-slate-100 text-sm">
                             <div className="flex items-center pr-2 whitespace-nowrap overflow-hidden">
                                <span className="text-slate-500 font-bold mr-2 shrink-0">目前狀態：</span>
                                <span className={`px-2.5 py-1 rounded-lg text-xs border font-bold shadow-sm truncate ${getStatusColorBadge(selectedProject.status)}`}>{selectedProject.status}</span>
                             </div>
                             <div className="flex items-center pl-2 whitespace-nowrap overflow-hidden">
                                <span className="text-slate-500 font-bold mr-2 shrink-0">最後更新：</span>
                                <span className="text-slate-800 font-black flex items-center gap-1.5 truncate"><Icon name="clock" className="w-4 h-4 shrink-0 text-slate-400"/> {selectedProject.lastUpdate}</span>
                             </div>
                             <div className="flex items-center pr-2 whitespace-nowrap overflow-hidden">
                                <span className="text-slate-500 font-bold mr-2 shrink-0">主辦機關：</span>
                                <span className="text-slate-800 font-bold truncate" title={selectedProject.agency}>{selectedProject.agency || '-'}</span>
                             </div>
                             <div className="flex items-center pl-2 whitespace-nowrap overflow-hidden">
                                <span className="text-slate-500 font-bold mr-2 shrink-0">承辦人員：</span>
                                <span className="text-slate-800 font-bold truncate" title={selectedProject.handler}>{selectedProject.handler || '-'}</span>
                             </div>
                             <div className="flex items-center col-span-1 sm:col-span-2 mt-1 whitespace-nowrap overflow-hidden">
                                <span className="text-slate-500 font-bold mr-2 shrink-0">聯絡電話：</span>
                                <span className="text-slate-800 font-bold truncate" title={selectedProject.handlerPhone}>{selectedProject.handlerPhone || '-'}</span>
                             </div>
                          </div>
                          {/* ========================================================= */}

                          {(selectedProject.keywords || selectedProject.govUrl || (selectedProject.sources && selectedProject.sources.length > 0)) && (
                            <div className="space-y-3 text-sm">
                              <div className="text-emerald-700 font-black mb-3 flex items-center gap-1.5"><Icon name="bot" className="w-4 h-4"/> AI 精準追蹤設定</div>
                              {selectedProject.keywords && (
                                 <div className="bg-emerald-50 text-emerald-800 p-3 rounded-xl border border-emerald-100 flex flex-col gap-1.5">
                                   <span className="font-bold flex items-center gap-1.5 text-xs text-emerald-600"><Icon name="tag" className="w-3.5 h-3.5"/> 追蹤關鍵字：</span>
                                   <span className="font-bold leading-relaxed">{selectedProject.keywords}</span>
                                 </div>
                              )}
                              {(selectedProject.sources || selectedProject.govUrl) && (
                                 <div className="bg-blue-50 p-3 rounded-xl border border-blue-100 flex flex-col gap-1.5">
                                   <span className="text-blue-700 font-bold text-xs flex items-center gap-1.5"><Icon name="link" className="w-3.5 h-3.5"/> 追蹤特定來源：</span>
                                   <div className="flex flex-col gap-2.5 mt-1">
                                     {selectedProject.sources && selectedProject.sources.length > 0 ? (
                                       selectedProject.sources.map((s, idx) => s.url && (
                                         <a key={idx} href={s.url.startsWith('http') ? s.url : `https://${s.url}`} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 hover:underline flex items-start gap-1.5 text-[13px] font-medium transition-colors bg-white/60 p-2.5 rounded-lg border border-blue-100 shadow-sm w-full">
                                           <Icon name="external-link" className="w-4 h-4 shrink-0 mt-0.5"/> <span className="break-all leading-tight">{s.name || s.url}</span>
                                         </a>
                                       ))
                                     ) : selectedProject.govUrl && (
                                       selectedProject.govUrl.split(/[\s,]+/).filter(u => u.trim() !== '').map((url, idx) => (
                                         <a key={idx} href={url.startsWith('http') ? url : `https://${url}`} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 hover:underline flex items-start gap-1.5 text-[13px] font-medium transition-colors bg-white/60 p-2.5 rounded-lg border border-blue-100 shadow-sm w-full">
                                           <Icon name="external-link" className="w-4 h-4 shrink-0 mt-0.5"/> <span className="break-all leading-tight">{url}</span>
                                         </a>
                                       ))
                                     )}
                                   </div>
                                 </div>
                              )}
                            </div>
                          )}
                        </div>

                        <div className="w-full xl:w-[65%] bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden">
                          <div className="flex flex-col sm:flex-row items-start sm:items-center justify-between p-6 md:p-8 border-b border-slate-100 gap-6 bg-slate-50/50">
                            <h3 className="font-black text-xl md:text-2xl flex items-center gap-2 md:gap-3 text-slate-800"><Icon name="list-todo" className="w-6 h-6 md:w-7 md:h-7 text-blue-600" /> {hasPhases ? '專案進度與歷程' : '專案歷程紀錄'}</h3>
                            <div className="flex flex-col sm:flex-row items-start sm:items-center gap-4 md:gap-6 w-full sm:w-auto justify-between sm:justify-end">
                              <button onClick={openHistoryModal} className="hidden xl:flex px-5 py-2 md:py-2.5 bg-blue-600 text-white rounded-lg text-sm md:text-base font-bold shadow-md hover:bg-blue-700 items-center gap-2 transition-colors justify-center"><Icon name="plus" className="w-5 h-5" /> 新增歷程</button>
                              {hasPhases && <div className="flex items-center gap-3 w-full sm:w-auto"><span className="text-sm md:text-base text-slate-500 font-bold hidden sm:inline whitespace-nowrap">總進度 {progressPercent}%</span><div className="w-full sm:w-40 h-3 md:h-4 bg-slate-200 rounded-full overflow-hidden border border-slate-200"><div className="h-full bg-blue-600 rounded-full transition-all duration-1000" style={{width: `${progressPercent}%`}}></div></div></div>}
                            </div>
                          </div>
                          <div className="p-6 md:p-8 w-full overflow-x-hidden">
                            <div className="relative border-l-2 border-slate-200 ml-4 md:ml-6 space-y-10 md:space-y-12 pb-6 w-full">
                              {groupedEntries.length === 0 ? <div className="py-16 text-center text-slate-400 font-bold text-base italic bg-slate-50 rounded-xl w-full border border-dashed border-slate-200">本專案尚無任何歷史紀錄</div> : groupedEntries.map((group, idx) => {
                                if (group.type === 'log-group') {
                                   const isGen = group.isGeneral;
                                   const isCompleted = !isGen && group.phaseIdx < safePhaseIndex;
                                   const isCurrent = !isGen && group.phaseIdx === safePhaseIndex;
                                   const hasLogs = group.logs && group.logs.length > 0;
                                   return (
                                     <div key={`group-${idx}`} className="relative pl-8 md:pl-12 w-full">
                                        <div className="absolute left-[-13px] md:left-[-15px] top-0 bg-white">{isGen && hasPhases ? <Icon name="activity" className="w-6 h-6 md:w-7 md:h-7 text-amber-500" /> : isCompleted ? <Icon name="check-circle" className="w-6 h-6 md:w-7 md:h-7 text-emerald-500" /> : isCurrent ? <Icon name="arrow-right-circle" className="w-6 h-6 md:w-7 md:h-7 text-blue-600" /> : (!hasPhases ? <div className="w-6 h-6 md:w-7 md:h-7 rounded-full border-2 border-white shadow-sm bg-blue-600 ring-4 ring-blue-50 flex items-center justify-center"><div className="w-2 h-2 bg-white rounded-full"></div></div> : <Icon name="circle-dashed" className="w-6 h-6 md:w-7 md:h-7 text-slate-300" />)}</div>
                                        <div className="flex flex-col gap-4 lg:gap-5 w-full pr-0 md:pr-4 opacity-100">
                                          {(hasPhases || !isGen) && <div className="w-full shrink-0 flex flex-col gap-1.5 pt-0.5"><div className="flex items-start gap-3 text-slate-700"><span className={`text-sm md:text-base ${isGen ? 'text-amber-500' : 'text-slate-500'} w-5 text-right font-black shrink-0 mt-0.5`}>{isGen ? '*' : `${group.phaseIdx+1}.`}</span><div className="flex flex-col gap-1"><span className={`text-base md:text-xl font-black ${isCurrent ? 'text-blue-700' : 'text-slate-700'}`}>{group.phaseName}</span>{isGen ? <span className="text-sm md:text-base font-bold text-amber-600">非屬特定法定階段</span> : <div className="flex items-center gap-2"><span className="text-sm md:text-base font-bold text-slate-400">{isCompleted ? '已完成' : (isCurrent ? '進行中' : '')}</span>{(isCompleted || isCurrent) && hasLogs && <span className="text-sm md:text-base text-emerald-600 font-bold bg-emerald-50 px-2 py-0.5 rounded">更新至 {group.logs[group.logs.length-1].date}</span>}</div>}</div></div></div>}
                                          {hasLogs && <div className="w-full flex-1 mt-1 sm:mt-0"><div className={`${isGen && hasPhases ? 'bg-amber-50/40 border-amber-200/60' : 'bg-slate-50 border-slate-200'} rounded-xl p-4 md:p-6 w-full relative shadow-sm`}><div className={`hidden sm:flex text-xs md:text-sm font-bold text-slate-500 mb-4 border-b ${isGen && hasPhases ? 'border-amber-200/80' : 'border-slate-200/80'} pb-3 gap-6 pr-10`}><div className="w-24 md:w-36 shrink-0">發生日期</div><div className="flex-1">歷程說明與來源</div></div><div className="space-y-0">{group.logs.slice().sort((a,b) => parseTWDate(a.date) - parseTWDate(b.date)).map(l => {
                                              
                                              // === 修正：智慧提取資料來源名稱 ===
                                              let renderNote = l.note || '';
                                              let buttonSource = l.source;
                                              if (renderNote.includes("📌 資料來源：")) {
                                                  const parts = renderNote.split("📌 資料來源：");
                                                  renderNote = parts[0].trim();
                                                  if(parts[1]) buttonSource = parts[1].trim();
                                              }

                                              return (
                                                <div key={l.id} className={`flex flex-col sm:flex-row sm:items-start border-b ${isGen && hasPhases ? 'border-amber-200/40' : 'border-slate-200/60'} last:border-0 py-4 first:pt-0 last:pb-0 relative pr-0 sm:pr-10 hover:bg-white transition-colors group gap-3 sm:gap-6`}>
                                                  {/* === 修正：歷程案件狀態改為與來源不同的顏色 (灰色系) 且放大字體 === */}
                                                  <div className={`sm:w-24 md:w-36 shrink-0 text-sm md:text-base font-black ${isGen && hasPhases ? 'text-amber-700' : 'text-slate-700'} sm:mt-1.5 flex flex-col gap-3`}>
                                                    <div className="flex items-center gap-1.5 text-slate-500"><span className="sm:hidden text-slate-400"><Icon name="clock" className="w-3.5 h-3.5"/></span>{l.date}</div>
                                                    <div className="inline-flex w-fit items-center text-slate-700 bg-slate-100 px-3 py-1.5 rounded-lg border border-slate-200 shadow-sm leading-tight break-words text-sm font-black">{l.status || '-'}</div>
                                                  </div>
                                                  {/* ================================================================ */}
                                                  
                                                  <div className="flex-1 text-sm md:text-base text-slate-700 font-medium leading-relaxed sm:mt-1.5">
                                                    {renderNote && <p>{renderNote}</p>}
                                                    
                                                    {/* === 修正：超連結完美取代文字按鈕，並顯示正確來源名稱 === */}
                                                    {buttonSource && (
                                                      <div className={renderNote ? "mt-4" : "mt-1.5"}>
                                                        {l.sourceUrl ? (
                                                          <a href={l.sourceUrl} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 text-blue-700 bg-blue-50 hover:bg-blue-100 px-4 py-2 rounded-xl border border-blue-200 text-sm font-black transition-colors shadow-sm w-fit">
                                                            <Icon name="link" className="w-4 h-4" /> {buttonSource}
                                                          </a>
                                                        ) : (
                                                          <span className="inline-flex items-center gap-2 text-slate-600 bg-slate-100 px-4 py-2 rounded-xl border border-slate-200 text-sm font-black w-fit">
                                                            <Icon name="info" className="w-4 h-4 text-slate-400" /> {buttonSource}
                                                          </span>
                                                        )}
                                                      </div>
                                                    )}
                                                    {/* ==================================== */}
                                                  </div>
                                                  <button onClick={() => openEditHistoryModal(l)} className={`absolute right-0 top-3 sm:top-3 p-2 bg-white border border-slate-200 shadow-sm rounded-lg text-slate-400 hover:text-blue-600 sm:opacity-0 group-hover:opacity-100 transition-opacity active:bg-slate-100`}><Icon name="pencil" className="w-4 h-4" /></button>
                                                </div>
                                              )
                                            })}</div></div></div>}
                                        </div>
                                     </div>
                                   );
                                } 
                                else if (group.type === 'pending-phase') { return ( <div key={`pending-${group.idx}`} className="relative pl-8 md:pl-12 w-full opacity-40 grayscale grayscale-100"><div className="absolute left-[-13px] md:left-[-15px] top-0 bg-white"><Icon name="circle-dashed" className="w-6 h-6 md:w-7 md:h-7 text-slate-300" /></div><div className="flex flex-col lg:flex-row gap-4 lg:gap-8 w-full pr-4"><div className="w-full shrink-0 flex flex-col gap-1.5 pt-0.5"><div className="flex items-start gap-3 text-slate-700"><span className="text-sm md:text-base text-slate-500 w-5 text-right font-bold shrink-0 mt-0.5">{group.idx+1}.</span><div className="flex flex-col gap-1"><span className="text-base md:text-xl font-black text-slate-700">{group.phase}</span><span className="text-sm md:text-base font-bold text-slate-400">尚未啟動之程序</span></div></div></div></div></div> ); }
                                return null;
                              })}
                            </div>
                          </div>
                        </div>
                      </div>
                    </div>
                  </div>
                );
              })() : null
            )}
          </main>

          {currentView === 'dashboard' && (
            <button onClick={openAddModal} className="md:hidden fixed bottom-6 right-6 w-14 h-14 bg-blue-600 text-white rounded-full shadow-[0_8px_30px_rgb(0,0,0,0.2)] flex items-center justify-center z-40 hover:bg-blue-700 active:scale-95 transition-transform"><Icon name="plus" className="w-6 h-6" /></button>
          )}

          {/* 🌟 待審核 Inbox Modal */}
          {isInboxOpen && (
            <div className="fixed inset-0 bg-slate-900/70 z-[100] flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-3xl rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col h-[90vh] sm:max-h-[85vh] overflow-hidden border border-slate-200">
                <div className="p-5 sm:p-6 border-b border-slate-100 flex justify-between items-center bg-amber-50">
                  <span className="font-black text-amber-900 text-lg flex items-center gap-3"><Icon name="inbox" className="w-6 h-6 text-amber-600" /> AI 待審核區</span>
                  <button onClick={()=>setIsInboxOpen(false)} className="text-amber-700 hover:bg-amber-100 p-2 rounded-full transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                </div>
                <div className="p-4 sm:p-6 overflow-y-auto space-y-4 bg-slate-50 flex-1">
                  {pendingUpdates.length === 0 ? <div className="text-center py-16 text-slate-400 font-bold italic">目前收件匣是空的，機器人正在雲端守候中...</div> : pendingUpdates.map(update => {
                    
                    let typeBadge = "系統通知";
                    let typeColor = "bg-slate-100 text-slate-600";
                    let contentText = update.note || "";
                    let sourceText = update.source || "";

                    if (contentText.startsWith("【新聞】")) {
                      typeBadge = "📰 新聞";
                      typeColor = "bg-blue-100 text-blue-700 border-blue-200";
                      contentText = contentText.replace("【新聞】", "").trim();
                    } else if (contentText.startsWith("【政府資訊】")) {
                      typeBadge = "🏛️ 政府資訊";
                      typeColor = "bg-emerald-100 text-emerald-700 border-emerald-200";
                      contentText = contentText.replace("【政府資訊】", "").trim();
                      if (contentText.includes("📌 資料來源：")) {
                         const parts = contentText.split("📌 資料來源：");
                         contentText = parts[0].trim();
                         if(parts[1]) sourceText = parts[1].trim(); // 確實抓取真實資料來源名稱
                      }
                    } else if (contentText.startsWith("【機器人原始抓取資料】")) {
                      typeBadge = "🤖 原始資料";
                      typeColor = "bg-amber-100 text-amber-700 border-amber-200";
                      contentText = contentText.replace("【機器人原始抓取資料】", "").trim();
                    }

                    return (
                      <div key={update.id} className="bg-white p-5 sm:p-6 rounded-2xl border border-slate-200 shadow-sm hover:border-blue-400 transition-all flex flex-col gap-4">
                        
                        <div className="flex flex-col sm:flex-row sm:justify-between items-start gap-4 mb-2">
                          <div>
                            <div className="text-blue-800 font-black text-xl">{update.projectName}</div>
                            <div className="text-slate-400 text-xs font-bold mt-1 flex items-center gap-1"><Icon name="clock" className="w-3.5 h-3.5"/> 抓取日期：{update.date}</div>
                          </div>
                          <div className="flex gap-2 w-full sm:w-auto">
                            <button onClick={()=>handleRejectUpdate(update.id)} className="flex-1 sm:flex-none p-3 sm:p-2.5 flex justify-center text-red-500 bg-red-50 sm:bg-transparent border border-red-100 sm:border-none hover:bg-red-100 rounded-xl transition-colors" title="捨棄刪除"><Icon name="trash-2" className="w-5 h-5"/></button>
                            <button onClick={()=>handleApproveUpdate(update)} className="flex-[3] sm:flex-none bg-blue-600 text-white px-5 py-3 sm:py-2.5 rounded-xl font-black text-sm shadow-md hover:bg-blue-700 active:scale-95 transition-all text-center">確認加入</button>
                          </div>
                        </div>

                        <div className="flex flex-col gap-4">
                          <div>
                            <span className={`px-3 py-1.5 rounded-md text-xs font-black border shadow-sm ${typeColor}`}>{typeBadge}</span>
                          </div>
                          
                          <div className="text-slate-800 text-base md:text-lg font-bold leading-relaxed px-1">
                            {contentText.split('\n').map((line, idx) => {
                              const urlRegex = /(https?:\/\/[^\s]+)/g;
                              const parts = line.split(urlRegex);
                              return (
                                <div key={idx} className={idx > 0 ? "mt-2" : ""}>
                                  {parts.map((part, j) => {
                                    const isUrl = part.startsWith('http://') || part.startsWith('https://');
                                    return isUrl ? (
                                      <a key={j} href={part} target="_blank" rel="noreferrer" className="text-blue-600 hover:text-blue-800 hover:underline break-all">
                                        {part}
                                      </a> 
                                    ) : part;
                                  })}
                                </div>
                              );
                            })}
                          </div>
                          
                          {/* === 修正：點擊按鈕直接取代來源文字，並顯示正確來源 === */}
                          <div className="mt-4 border-t border-slate-100 pt-4 flex">
                            {update.sourceUrl ? (
                              <a href={update.sourceUrl} target="_blank" rel="noreferrer" className="inline-flex items-center gap-2 text-sm font-black text-blue-700 hover:text-blue-800 hover:underline transition-colors bg-blue-50 hover:bg-blue-100 px-4 py-2.5 rounded-xl border border-blue-200 shadow-sm w-fit">
                                <Icon name="link" className="h-4 w-4" /> {sourceText || "前往來源網頁"}
                              </a>
                            ) : (
                              <span className="inline-flex items-center gap-2 text-sm font-black text-slate-600 bg-slate-100 px-4 py-2.5 rounded-xl border border-slate-200 w-fit">
                                <Icon name="info" className="h-4 w-4 text-slate-400" /> {sourceText || "系統來源"}
                              </span>
                            )}
                          </div>
                          {/* ===================================== */}
                        </div>
                        
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>
          )}

          {/* 🌟 雲端查核紀錄 Modal */}
          {isReportsModalOpen && (
            <div className="fixed inset-0 bg-slate-900/70 z-[100] flex items-center justify-center p-4 backdrop-blur-md animate-in fade-in duration-300">
              <div className="bg-white w-full max-w-4xl rounded-2xl shadow-2xl flex flex-col h-[85vh] overflow-hidden border border-slate-200">
                <div className="p-5 sm:p-6 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                  <span className="font-black text-slate-800 text-lg flex items-center gap-3"><Icon name="clipboard-list" className="w-6 h-6 text-slate-600" /> 系統自動查核紀錄</span>
                  <button onClick={()=>{setIsReportsModalOpen(false); setSelectedReport(null);}} className="text-slate-400 hover:bg-slate-200 p-2 rounded-full transition-colors"><Icon name="x" className="w-6 h-6" /></button>
                </div>
                
                <div className="flex flex-col md:flex-row flex-1 overflow-hidden">
                  <div className={`${selectedReport ? 'hidden md:block' : 'block'} md:w-1/3 border-r border-slate-200 bg-slate-50 overflow-y-auto p-4 space-y-2`}>
                    {reports.length === 0 ? <div className="text-center text-slate-400 text-sm mt-10 font-bold">尚無查核紀錄，機器人執行後會自動產生</div> : reports.map(r => (
                      <button key={r.id} onClick={()=>setSelectedReport(r)} className={`w-full text-left p-4 rounded-xl border transition-all ${selectedReport?.id === r.id ? 'bg-blue-50 border-blue-300 shadow-sm' : 'bg-white border-slate-200 hover:border-blue-200'}`}>
                        <div className="font-black text-slate-700 text-sm mb-1">{r.dateStr}</div>
                        <div className="flex gap-2 text-xs font-bold">
                          <span className="text-emerald-600">更新: {r.updated}</span>
                          <span className="text-slate-400">總計: {r.total}</span>
                        </div>
                      </button>
                    ))}
                  </div>
                  
                  <div className={`${!selectedReport ? 'hidden md:flex' : 'flex'} md:w-2/3 bg-white p-0 md:p-6 overflow-y-hidden flex-col h-full`}>
                    {selectedReport ? (
                       <div className="p-4 md:p-0 flex flex-col h-full">
                         <button onClick={()=>setSelectedReport(null)} className="md:hidden mb-4 text-blue-600 font-bold flex items-center gap-1"><Icon name="arrow-left" className="w-4 h-4"/> 返回列表</button>
                         <div className="bg-slate-800 text-slate-50 p-4 md:p-6 rounded-xl font-mono text-xs md:text-sm leading-relaxed overflow-y-auto flex-1 whitespace-pre-wrap shadow-inner">
                           {selectedReport.reportText}
                         </div>
                       </div>
                    ) : (
                       <div className="h-full flex items-center justify-center text-slate-400 font-bold">
                         請選擇左側的紀錄以檢視詳細內容
                       </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* 系統設定 Modal */}
          {isTypeModalOpen && (
            <div className="fixed inset-0 bg-slate-900/60 z-[60] flex items-end sm:items-center justify-center p-0 sm:p-4 backdrop-blur-sm">
              <div className="bg-white w-full max-w-2xl rounded-t-3xl sm:rounded-2xl shadow-2xl flex flex-col max-h-[85vh] border-0 sm:border-2 sm:border-slate-200 animate-in slide-in-from-bottom-4 duration-200">
                <div className="p-5 border-b border-slate-100 flex justify-between items-center bg-slate-50 shrink-0 sm:rounded-t-2xl">
                  <span className="font-black text-slate-800 text-lg flex items-center gap-2"><Icon name="settings" className="w-5 h-5 text-slate-600" /> 系統設定</span>
                  <button onClick={()=>{setIsTypeModalOpen(false); setConfirmDeleteType(false);}} className="text-slate-400 hover:text-slate-600"><Icon name="x" className="w-6 h-6" /></button>
                </div>
                <div className="flex border-b border-slate-200 bg-white">
                  <button onClick={() => setSettingsTab('types')} className={`flex-1 py-4 text-sm font-black transition-colors border-b-2 ${settingsTab === 'types' ? 'text-blue-600 border-blue-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>案件類型與程序</button>
                  <button onClick={() => setSettingsTab('sources')} className={`flex-1 py-4 text-sm font-black transition-colors border-b-2 ${settingsTab === 'sources' ? 'text-blue-600 border-blue-600' : 'text-slate-400 border-transparent hover:text-slate-600'}`}>常用來源管理</button>
                </div>
                <div className="p-6 overflow-y-auto no-scrollbar space-y-8 flex-1">
                  {settingsTab === 'types' ? (
                    settingsView === 'list' ? (
                      <div className="space-y-4">
                        <div className="flex items-center justify-between pb-2 border-b border-slate-100">
                          <div className="flex items-center gap-2"><Icon name="list-todo" className="w-5 h-5 text-blue-600" /><h4 className="font-black text-slate-800 text-base md:text-lg">案件類型管理</h4></div>
                          <button onClick={() => { setSettingsView('type-edit'); setNewTypeData({ name: '', phases: [''] }); }} className="text-sm font-bold text-blue-600 hover:text-blue-800 flex items-center gap-1 bg-blue-50 hover:bg-blue-100 px-3 py-1.5 rounded-lg transition-colors"><Icon name="plus-circle" className="w-4 h-4" /> 新增類型</button>
                        </div>
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-3">
                          {projectTypes.map((type, idx) => (
                            <div key={idx} onClick={() => { setEditingTypeIndex(idx); setNewTypeData(JSON.parse(JSON.stringify(type))); setSettingsView('type-edit'); setConfirmDeleteType(false); }} className="flex items-center justify-between p-4 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-blue-400 hover:shadow-md transition-all group">
                              <div className="flex flex-col gap-1"><span className="font-black text-slate-700 group-hover:text-blue-700">{type.name}</span><span className="text-xs font-bold text-slate-400">共 {type.phases.length} 個程序</span></div>
                              <Icon name="chevron-right" className="w-5 h-5 text-slate-300 group-hover:text-blue-500 transition-transform group-hover:translate-x-1" />
                            </div>
                          ))}

                  <div className="flex items-center gap-2 shrink-0"><button onClick={()=>setIsHistoryModalOpen(false)} className="px-6 py-2.5 text-slate-600 font-bold text-sm md:text-base bg-white border border-slate-300 rounded-lg hover:bg-slate-50 shadow-sm whitespace-nowrap">取消</button><button onClick={handleSaveHistory} className="px-8 py-2.5 bg-blue-600 text-white rounded-lg font-bold text-sm md:text-base shadow-md hover:bg-blue-700 whitespace-nowrap">確認儲存</button></div>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
